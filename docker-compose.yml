services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - default

  fastapi-bot:
    build: .
    container_name: llm-docs-pipeline-fastapi-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_API_URL=http://ollama:11434/api
      - OLLAMA_DEFAULT_MODEL=qwen2.5-coder:7b
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./templates:/app/templates
      - ./data:/app/data
      - ./storage:/app/storage
      - ./inventory:/app/inventory
    networks:
      - default

volumes:
  ollama_data:

networks:
  default:
    driver: bridge
